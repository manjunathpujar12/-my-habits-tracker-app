<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#07070f"/>
<title>Manjunath · Daily Habits</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#07070f;--card:#111120;--card2:#0d0d1a;--border:#1e1e32;--text:#f0eeff;--muted:#55557a;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Nunito',sans-serif;color:var(--text);max-width:430px;margin:0 auto;display:flex;flex-direction:column;}
#app{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:88px;}
#app::-webkit-scrollbar{display:none;}
 
/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(8,8,18,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0);}
.nb{flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 0 9px;cursor:pointer;font-family:'Nunito',sans-serif;transition:color .2s;}
.nb.on{color:#a78bfa;}
.ni{font-size:21px;line-height:1;}
.nl{font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;}
 
/* HEADER */
.hdr{padding:48px 20px 14px;background:linear-gradient(180deg,#0c0c1e,var(--bg));}
.eyebrow{font-size:11px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:5px;font-weight:800;}
.pg-title{font-size:26px;font-weight:900;letter-spacing:-.5px;line-height:1.1;}
 
/* KDB QUOTE */
.kdb-quote{background:linear-gradient(135deg,#1a1a2e,#0d0d1a);border:1px solid #a78bfa30;border-radius:14px;padding:12px 16px;margin:10px 16px 0;position:relative;overflow:hidden;}
.kdb-quote::before{content:'"';position:absolute;top:-10px;left:10px;font-size:80px;color:#a78bfa15;font-family:Georgia,serif;line-height:1;}
.kdb-quote-text{font-size:13px;font-weight:800;color:#c8c8e8;line-height:1.5;font-style:italic;position:relative;z-index:1;}
.kdb-quote-by{font-size:11px;color:#a78bfa;font-weight:700;margin-top:5px;letter-spacing:.05em;}
 
/* PROGRESS CARD */
.pcrd{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:16px 18px;display:flex;align-items:center;gap:16px;margin:10px 16px 0;}
.pmeta{flex:1;}
.plbl{font-size:12px;color:var(--muted);margin-bottom:3px;font-weight:700;}
.pnum{font-size:30px;font-weight:900;letter-spacing:-1px;line-height:1;}
.psub{font-size:12px;color:var(--muted);margin-top:3px;font-weight:600;}
 
/* WEIGHT */
.wtcrd{background:linear-gradient(135deg,#1a1a2e,#111120);border:1px solid #4ade8030;border-radius:18px;padding:14px 16px;margin:10px 16px 0;display:flex;align-items:center;gap:14px;}
.wtbar-wrap{flex:1;}
.wtbar-bg{height:8px;background:#1a1a2e;border-radius:4px;overflow:hidden;margin:6px 0;}
.wtbar-fill{height:100%;background:linear-gradient(90deg,#4ade80,#fbbf24);border-radius:4px;transition:width .5s ease;}
 
/* SECTION */
.sec{padding:0 16px;}
.stitle-row{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px;}
.stitle{font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;font-weight:800;}
 
/* HABIT CARD */
.hcrd{background:var(--card);border:2px solid var(--border);border-radius:18px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:13px;cursor:pointer;user-select:none;transition:border-color .2s,background .2s;}
.hcrd.done{border-color:var(--hc);}
.hico{width:46px;height:46px;border-radius:13px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid transparent;transition:all .2s;}
.hcrd.done .hico{border-color:var(--hc);}
.hmeta{flex:1;min-width:0;}
.hname{font-size:15px;font-weight:800;color:#c8c8e8;margin-bottom:2px;}
.hcrd.done .hname{color:#fff;}
.hsub{font-size:12px;color:var(--muted);font-weight:600;}
.hstrk{font-size:11px;color:#fb923c;margin-top:3px;font-weight:700;}
.hchk{width:28px;height:28px;border-radius:50%;border:2.5px solid #2e2e48;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:14px;font-weight:900;color:#000;}
.hcrd.done .hchk{background:var(--hc);border-color:var(--hc);}
.expand-hint{font-size:10px;color:var(--muted);font-weight:800;flex-shrink:0;}
 
/* EXPAND PANELS */
.expand-panel{background:var(--card2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px;}
.panel-hdr{padding:11px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.panel-hdr-lbl{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-weight:800;}
.panel-row{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid #1a1a2820;}
.panel-row:last-child{border-bottom:none;}
.panel-chk{width:26px;height:26px;border-radius:8px;border:2px solid #2e2e48;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#000;transition:all .2s;cursor:pointer;margin-top:2px;}
.panel-chk.done{background:var(--hc2);border-color:var(--hc2);}
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;}
 
/* WATER SLOTS */
.wslots{background:var(--card2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px;}
.wslot{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #1a1a2820;transition:background .15s;}
.wslot:last-child{border-bottom:none;}
.wslot.done{background:#38bdf812;}
.wschk{width:23px;height:23px;border-radius:7px;border:2px solid #2e2e48;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#000;transition:all .2s;cursor:pointer;}
.wslot.done .wschk{background:#38bdf8;border-color:#38bdf8;}
.wsinfo{flex:1;}
.wstime{font-size:13px;font-weight:800;color:#c8c8e8;margin-bottom:1px;}
.wslot.done .wstime{color:#38bdf8;}
.wsnote{font-size:11px;color:var(--muted);font-weight:600;}
.wdel{width:28px;height:28px;border-radius:8px;background:#ff4d4d15;border:1px solid #ff4d4d30;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:14px;transition:all .2s;}
.wdel:active{background:#ff4d4d30;}
 
/* ADD WATER FORM */
.wadd-form{padding:12px 14px;border-top:1px solid var(--border);background:#38bdf808;}
.wadd-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.wadd-input{background:#0d0d1a;border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;flex:1;outline:none;}
.wadd-input:focus{border-color:#38bdf8;}
.wadd-btn{background:#38bdf8;border:none;border-radius:10px;padding:8px 14px;color:#000;font-size:13px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;white-space:nowrap;}
.wadd-hint{font-size:11px;color:#38bdf870;font-weight:600;line-height:1.5;}
 
/* WEEKLY */
.wkwrap{padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.wkwrap::-webkit-scrollbar{display:none;}
.wktbl{border-collapse:separate;border-spacing:4px;min-width:300px;width:100%;}
.wkgh{font-size:10px;color:var(--muted);text-align:center;padding:4px 0;font-weight:800;text-transform:uppercase;}
.wkgh.tc{color:#a78bfa;}
.wkgl{font-size:11px;color:#808098;padding:3px 2px;white-space:nowrap;font-weight:700;}
.dot{width:29px;height:29px;border-radius:8px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;border:1.5px solid var(--border);background:var(--card);color:var(--muted);}
.dot.done{border-color:transparent;color:#000;}
.dot.fut{opacity:.2;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 16px;}
.scrd{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:14px;}
.scrd.on{border-color:var(--hc);}
.scico{font-size:20px;margin-bottom:5px;}
.scnm{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:700;}
.scval{font-size:26px;font-weight:900;color:#2e2e48;letter-spacing:-1px;}
.scrd.on .scval{color:#fb923c;}
.sclbl{font-size:10px;color:var(--muted);font-weight:700;}
 
/* GUIDE */
.gstep{display:flex;gap:13px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:17px;margin:0 16px 9px;}
.gsico{font-size:24px;flex-shrink:0;margin-top:1px;}
.gstitle{font-size:15px;font-weight:900;color:var(--text);margin-bottom:4px;}
.gsbody{font-size:13px;color:#8080a0;line-height:1.65;font-weight:600;}
.sched{margin:0 16px 14px;padding:16px;background:var(--card);border:1px solid #a78bfa30;border-radius:17px;}
.schedt{font-size:14px;font-weight:900;color:#a78bfa;margin-bottom:11px;}
.srow{display:flex;gap:9px;font-size:13px;color:var(--muted);line-height:2.1;font-weight:600;}
.srow strong{color:#c8c8e8;font-weight:800;}
.rules{margin:0 16px 14px;padding:15px;background:var(--card);border:1px solid var(--border);border-radius:16px;}
.rulest{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:9px;font-weight:800;}
.rulestxt{font-size:13px;color:#9090b8;line-height:2;font-weight:600;}
 
/* TIP */
.tip{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px 16px;margin-top:8px;}
.tip-lbl{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;font-weight:800;}
.tip-txt{font-size:13px;color:#9090b8;line-height:1.75;font-weight:600;}
 
/* MODAL */
#modal-bg{display:none;position:fixed;inset:0;background:#000000cc;z-index:500;align-items:flex-end;justify-content:center;}
#modal-bg.on{display:flex;}
#modal{background:#111120;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:430px;border-top:1px solid var(--border);}
#modal h3{font-size:18px;font-weight:900;margin-bottom:16px;}
#modal input,#modal select{background:#0d0d1a;border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-weight:700;font-family:'Nunito',sans-serif;width:100%;outline:none;margin-bottom:10px;}
#modal input:focus,#modal select:focus{border-color:#a78bfa;}
.modal-row{display:flex;gap:8px;margin-bottom:10px;}
.modal-row input{margin-bottom:0;}
#modal-save{background:#a78bfa;border:none;border-radius:12px;padding:14px;color:#000;font-size:15px;font-weight:900;cursor:pointer;width:100%;font-family:'Nunito',sans-serif;margin-top:4px;}
#modal-cancel{background:transparent;border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:'Nunito',sans-serif;margin-top:8px;}
 
/* CELEBRATE */
#cel{display:none;position:fixed;inset:0;z-index:999;background:#000000dd;flex-direction:column;align-items:center;justify-content:center;gap:13px;}
#cel.on{display:flex;}
.celb{font-size:88px;animation:bop .4s ease infinite alternate;}
.celt{font-size:30px;font-weight:900;}
.cels{font-size:15px;color:#a78bfa;font-weight:700;}
@keyframes bop{from{transform:scale(1) rotate(-4deg);}to{transform:scale(1.2) rotate(4deg);}}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.up{animation:up .3s ease both;}
svg.svgr{display:block;transform:rotate(-90deg);}
</style>
</head>
<body>
<div id="app"></div>
 
<div id="nav">
  <button class="nb on" id="nb-today" onclick="goTab('today')"><span class="ni">⚡</span><span class="nl">Today</span></button>
  <button class="nb" id="nb-weekly" onclick="goTab('weekly')"><span class="ni">📅</span><span class="nl">Weekly</span></button>
  <button class="nb" id="nb-guide" onclick="goTab('guide')"><span class="ni">🗺️</span><span class="nl">Guide</span></button>
</div>
 
<!-- ADD HABIT MODAL -->
<div id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <h3 id="modal-title">➕ Add New Habit</h3>
    <input id="modal-name" placeholder="Habit name e.g. Push ups" maxlength="40"/>
    <div class="modal-row">
      <input id="modal-icon" placeholder="Icon e.g. 💪" maxlength="4" style="width:80px;flex:none;text-align:center;font-size:22px;"/>
      <input id="modal-sub" placeholder="Description e.g. 20 reps daily"/>
    </div>
    <select id="modal-color">
      <option value="#a78bfa">💜 Purple</option>
      <option value="#38bdf8">💙 Blue</option>
      <option value="#4ade80">💚 Green</option>
      <option value="#fbbf24">💛 Yellow</option>
      <option value="#fb923c">🧡 Orange</option>
      <option value="#f472b6">🩷 Pink</option>
      <option value="#34d399">🟢 Mint</option>
      <option value="#818cf8">🔵 Indigo</option>
    </select>
    <button id="modal-save" onclick="saveNewHabit()">✅ Add Habit</button>
    <button id="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>
 
<div id="cel" onclick="this.classList.remove('on')">
  <div class="celb">🎉</div>
  <div class="celt">Perfect Day Bro!</div>
  <div class="cels">All habits complete 🔥</div>
  <div style="font-size:12px;color:var(--muted);font-weight:600;margin-top:4px">Tap to close</div>
</div>

const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
 
// ═══ STATE ════════════════════════════════════════════════════════
let ST={tab:'today',openPanel:'',checked:{},water:{},subChecked:{},weight:54,wslots:[],customHabits:[],faceChecked:{}};
 
function tk(){return new Date().toISOString().split('T')[0];}
function save(){
  try{
    localStorage.setItem('mhv7',JSON.stringify({
      c:ST.checked,w:ST.water,sc:ST.subChecked,wt:ST.weight,
      ws:ST.wslots,ch:ST.customHabits,fc:ST.faceChecked
    }));
  }catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('mhv7')||'{}');
    ST.checked=d.c||{};ST.water=d.w||{};ST.subChecked=d.sc||{};
    ST.weight=d.wt||54;ST.wslots=d.ws||JSON.parse(JSON.stringify(DEFAULT_WSLOTS));
    ST.customHabits=d.ch||[];ST.faceChecked=d.fc||{};
  }catch(e){ST.wslots=JSON.parse(JSON.stringify(DEFAULT_WSLOTS));}
}
 
function allHabits(){return [...DEFAULT_HABITS,...ST.customHabits];}
 
// ═══ COMPUTED ═════════════════════════════════════════════════════
function wMl(){return ST.wslots.filter(s=>(ST.water[tk()]||{})[s.id]).reduce((a,s)=>a+s.ml,0);}
function wCount(){return ST.wslots.filter(s=>(ST.water[tk()]||{})[s.id]).length;}
function wTotal(){return ST.wslots.reduce((a,s)=>a+s.ml,0);}
function wPct(){const t=wTotal();return t>0?Math.min(100,Math.round((wMl()/t)*100)):0;}
 
function isDone(hid,day){
  day=day||tk();
  const sc=ST.subChecked[day]||{};
  const fc=ST.faceChecked[day]||{};
  if(hid==='water') return ST.wslots.length>0&&ST.wslots.every(s=>(ST.water[day]||{})[s.id]);
  if(hid==='breathing') return BREATHING.every(b=>sc['b_'+b.id]);
  if(hid==='height') return HEIGHT_EX.every(h=>sc['h_'+h.id]);
  if(hid==='shake') return !!sc['shake_morning'];
  if(hid==='face') return FACE_SECTIONS.every((_,i)=>fc['fs_'+i]);
  if(hid==='sleep') return SLEEP_ROUTINE.every(s=>sc['sl_'+s.id]);
  return !!(ST.checked[day]||{})[hid];
}
function doneToday(){return allHabits().filter(h=>isDone(h.id)).length;}
function dayPct(){return Math.round((doneToday()/allHabits().length)*100);}
function streak(hid){
  let s=0,d=new Date();d.setDate(d.getDate()-1);
  for(let i=0;i<365;i++){const k=d.toISOString().split('T')[0];if(isDone(hid,k)){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}
function avgStreak(){return Math.round(allHabits().reduce((a,h)=>a+streak(h.id),0)/Math.max(1,allHabits().length));}
function weightPct(){return Math.max(0,Math.round(((ST.weight-54)/(60-54))*100));}
 
// ═══ SVG RING ═════════════════════════════════════════════════════
function ring(pct,color,sz,sw){
  sz=sz||72;sw=sw||6;
  const r=(sz-sw*2)/2,c=2*Math.PI*r,off=c-(pct/100)*c;
  return `<svg width="${sz}" height="${sz}" class="svgr"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#ffffff08" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" stroke-linecap="round" style="transition:stroke-dashoffset .5s ease"/></svg>`;
}
 
// ═══ ACTIONS ══════════════════════════════════════════════════════
function tapHabit(hid){
  const expandTypes=['water','breathing','height','shake','face','sleep'];
  if(expandTypes.includes(hid)){ST.openPanel=ST.openPanel===hid?'':hid;render();return;}
  const d=tk();if(!ST.checked[d])ST.checked[d]={};
  ST.checked[d][hid]=!ST.checked[d][hid];
  save();render();tryParty();
}
function tapSub(key){
  const d=tk();if(!ST.subChecked[d])ST.subChecked[d]={};
  ST.subChecked[d][key]=!ST.subChecked[d][key];
  save();render();tryParty();
}
function tapFace(key){
  const d=tk();if(!ST.faceChecked[d])ST.faceChecked[d]={};
  ST.faceChecked[d][key]=!ST.faceChecked[d][key];
  save();render();tryParty();
}
function tapWater(sid){
  const d=tk();if(!ST.water[d])ST.water[d]={};
  ST.water[d][sid]=!ST.water[d][sid];
  save();render();tryParty();
}
function deleteWslot(sid){
  ST.wslots=ST.wslots.filter(s=>s.id!==sid);
  save();render();
}
function addWslot(){
  const time=document.getElementById('wadd-time').value;
  const ml=parseInt(document.getElementById('wadd-ml').value)||200;
  const note=document.getElementById('wadd-note').value||'Custom slot';
  if(!time){alert('Please enter a time!');return;}
  const id='wc_'+Date.now();
  // Insert sorted by time
  const newSlot={id,time,ml,note};
  ST.wslots.push(newSlot);
  ST.wslots.sort((a,b)=>{
    const toMins=t=>{const m=t.match(/(\d+):(\d+)\s*(am|pm)/i);if(!m)return 0;let h=parseInt(m[1]),mn=parseInt(m[2]);if(m[3].toLowerCase()==='pm'&&h!==12)h+=12;if(m[3].toLowerCase()==='am'&&h===12)h=0;return h*60+mn;};
    return toMins(a.time)-toMins(b.time);
  });
  save();render();
}
function updateWeight(val){ST.weight=parseFloat(val)||54;save();render();}
function tryParty(){
  if(doneToday()===allHabits().length){
    document.getElementById('cel').classList.add('on');
    setTimeout(()=>document.getElementById('cel').classList.remove('on'),4500);
  }
}
function goTab(t){
  ST.tab=t;ST.openPanel='';
  ['today','weekly','guide'].forEach(x=>document.getElementById('nb-'+x).classList.toggle('on',x===t));
  render();document.getElementById('app').scrollTop=0;
}
 
// ═══ MODAL ════════════════════════════════════════════════════════
function openModal(){document.getElementById('modal-bg').classList.add('on');}
function closeModal(){document.getElementById('modal-bg').classList.remove('on');}
function saveNewHabit(){
  const name=document.getElementById('modal-name').value.trim();
  const icon=document.getElementById('modal-icon').value.trim()||'⭐';
  const sub=document.getElementById('modal-sub').value.trim()||'Daily habit';
  const color=document.getElementById('modal-color').value;
  if(!name){alert('Please enter a habit name!');return;}
  const id='custom_'+Date.now();
  ST.customHabits.push({id,label:name,sub,icon,color,type:'check'});
  save();closeModal();render();
  document.getElementById('modal-name').value='';
  document.getElementById('modal-icon').value='';
  document.getElementById('modal-sub').value='';
}
function deleteCustomHabit(id){
  if(!confirm('Remove this habit?'))return;
  ST.customHabits=ST.customHabits.filter(h=>h.id!==id);
  save();render();
}
 
// ═══ RENDER ═══════════════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  if(ST.tab==='today') app.innerHTML=renderToday();
  if(ST.tab==='weekly') app.innerHTML=renderWeekly();
  if(ST.tab==='guide') app.innerHTML=renderGuide();
}
 
function renderExpandPanel(items,prefix,color,footer){
  const sc=ST.subChecked[tk()]||{};
  let o='';
  items.forEach(item=>{
    const key=prefix+item.id,done=!!sc[key];
    o+=`<div class="panel-row">
      <div style="font-size:20px;flex-shrink:0;margin-top:2px">${item.icon}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:800;color:#c8c8e8;margin-bottom:3px">${item.title}</div>
        <span class="pill" style="background:${item.color}20;color:${item.color};margin-bottom:5px">${item.badge}</span>
        <div style="font-size:11px;color:var(--muted);margin-top:5px;font-weight:600;line-height:1.6">${item.info}</div>
        <div style="font-size:11px;color:${item.color}80;margin-top:4px;font-weight:600">✨ ${item.benefit}</div>
      </div>
      <div class="panel-chk${done?' done':''}" style="--hc2:${item.color}" onclick="event.stopPropagation();tapSub('${key}')">${done?'✓':''}</div>
    </div>`;
  });
  o+=`<div style="padding:10px 16px;border-top:1px solid var(--border);background:${color}08"><p style="font-size:12px;color:${color}70;font-weight:600">${footer}</p></div>`;
  return o;
}

          o+=`<div style="padding:8px 16px 12px 20px">`;
          sec.donts.forEach(d=>{
            o+=`<div style="font-size:11px;color:#ff6b6b90;font-weight:700;line-height:1.8">${d}</div>`;

      });

  return o;
}
 
// ─── WEEKLY ───────────────────────────────────────────────────────
function renderWeekly(){
  const today=new Date(),dayN=today.getDay(),todayStr=tk();
  const week=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-dayN+i);return d;});
  const habits=allHabits();
  let o=`<div class="hdr up"><p class="eyebrow">This Week</p><h1 class="pg-title">Weekly Grid 📅</h1></div>
  <div class="wkwrap up"><table class="wktbl"><thead><tr><td style="width:75px"></td>`;
  week.forEach(d=>{
    const isT=d.toISOString().split('T')[0]===todayStr;
    o+=`<td class="wkgh${isT?' tc':''}">${DAYS[d.getDay()]}<br>${d.getDate()}</td>`;
  });
  o+=`</tr></thead><tbody>`;
  habits.forEach(h=>{
    o+=`<tr><td class="wkgl">${h.icon} ${h.label.split(' ')[0]}</td>`;
    week.forEach(d=>{
      const dk=d.toISOString().split('T')[0],fut=dk>todayStr,done=isDone(h.id,dk);
      o+=`<td style="text-align:center"><div class="dot${done?' done':''}${fut?' fut':''}" style="${done?`background:${h.color}`:''}">
        ${done?'✓':fut?'':'·'}</div></td>`;
    });
    o+=`</tr>`;
  });
  o+=`</tbody></table></div>
  <div style="margin:16px 16px 0;background:var(--card);border:1px solid #4ade8030;border-radius:18px;padding:16px;">
    <p style="font-size:13px;font-weight:800;color:#4ade80;margin-bottom:10px">⚖️ Weight Journey · 54kg → 60kg</p>
    <div style="height:10px;background:#1a1a2e;border-radius:5px;overflow:hidden;margin-bottom:12px">
      <div style="height:100%;width:${Math.max(2,weightPct())}%;background:linear-gradient(90deg,#4ade80,#fbbf24);border-radius:5px"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div style="background:#1a1a2e;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:900;color:#4ade80">${ST.weight}kg</div>
        <div style="font-size:10px;color:var(--muted);font-weight:700">Current</div>
      </div>
      <div style="background:#1a1a2e;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:900;color:#fbbf24">${(60-ST.weight).toFixed(1)}kg</div>
        <div style="font-size:10px;color:var(--muted);font-weight:700">To Go</div>
      </div>
      <div style="background:#1a1a2e;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:900;color:#a78bfa">${Math.ceil((60-ST.weight)/1.5)}</div>
        <div style="font-size:10px;color:var(--muted);font-weight:700">Weeks Est.</div>
      </div>
    </div>
  </div>
  <p class="stitle" style="padding:0 16px;margin-top:20px">Habit Streaks 🔥</p>
  <div class="sgrid up">`;
  habits.forEach(h=>{
    const s=streak(h.id);
    o+=`<div class="scrd${s>0?' on':''}" style="--hc:${h.color}">
      <div class="scico">${h.icon}</div>
      <div class="scnm">${h.label.split(' ')[0]}</div>
      <div class="scval">${s>0?'🔥 '+s:'—'}</div>
      <div class="sclbl">day streak</div>
    </div>`;
  });
  o+=`</div>`;
  return o;
}
